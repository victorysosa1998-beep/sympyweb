<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile - Sympy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="gradient-bg"></div>

    <section id="profile-screen" class="screen active" style="display: flex; flex-direction: column;">
    <div class="chat-header" style="position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: var(--bg-color); border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div class="header-info" style="padding: 15px;">
            <button class="back-btn clickable-text" onclick="window.location.href='index.html'">
                <i class="fas fa-chevron-left"></i>
            </button>
            <h4 style="margin-left: 10px;">My Profile</h4>
        </div>
    </div>

    <div class="container" style="margin-top: 80px; padding-bottom: 20px;">
        <div class="auth-card">
            <div class="avatar-ring" style="width: 100px; height: 100px; margin: 0 auto 20px;">
                <img src="assets/images/portrait-placeholder-removebg-preview.png" id="profile-pic" alt="User" style="width: 100%; height: 100%; border-radius: 50%; ">
            </div>
            
            <h1 id="profile-user-name" class="auth-title">Loading...</h1>
            <p id="profile-user-email" class="subtitle">Please wait...</p>
            
            <div class="auth-form" style="margin-top: 30px;">
               <button class="btn-secondary clickable-text" onclick="window.location.href='index.html?screen=voice-screen'">
    <i class="fas fa-arrow-left"></i> Back to App
</button>
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </div>
</section>
    <script>
        // Use the same config from your script.js
        const firebaseConfig = {
            apiKey: "AIzaSyDXTMsESWcJCzDMItxzQhVrPfnQXUDs8RY",
            authDomain: "sympy-ai.firebaseapp.com",
            projectId: "sympy-ai",
            storageBucket: "sympy-ai.firebasestorage.app",
            messagingSenderId: "949064788583",
            appId: "1:949064788583:web:9a63685807881b4da4c2c2"
        };

        firebase.initializeApp(firebaseConfig);

        // Listen for user state
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // Pass the information to the UI
                document.getElementById('profile-user-name').innerText = user.displayName || "User";
                document.getElementById('profile-user-email').innerText = user.email;
            } else {
                // If not logged in, send them back to login page
                window.location.href = 'index.html';
            }
        });

        // Handle Logout
        document.getElementById('logout-btn').onclick = () => {
            firebase.auth().signOut().then(() => {
                window.location.href = 'index.html';
            });
        };
    </script>
</body>
</html>
