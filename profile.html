<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile — Sympy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="gradient-bg"></div>

    <section id="profile-screen" class="screen active">
        <!-- Header -->
        <div class="chat-header" style="position:fixed;top:0;left:0;width:100%;z-index:1000;background:rgba(15,15,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);">
            <div class="header-info">
                <button class="back-btn clickable-text" onclick="window.location.href='index.html?screen=voice-screen'">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <h4 style="margin-left:8px;">My Profile</h4>
            </div>
        </div>

        <!-- Content -->
        <div style="width:100%;max-width:400px;margin-top:80px;padding:20px;">
            <div class="auth-card" style="text-align:center;">
                <!-- Avatar -->
                <div style="width:90px;height:90px;border-radius:50%;border:3px solid var(--accent-blue);overflow:hidden;margin:0 auto 18px;background:rgba(68,138,255,0.1);display:flex;align-items:center;justify-content:center;">
                    <i class="fas fa-user" style="font-size:38px;color:var(--accent-blue);"></i>
                </div>

                <h2 id="profile-user-name" style="font-size:22px;font-weight:bold;margin-bottom:6px;">Loading...</h2>
                <p id="profile-user-email" style="color:rgba(255,255,255,0.4);font-size:14px;margin-bottom:28px;">Please wait...</p>

                <!-- Stats row -->
                <div id="quota-display" style="display:flex;gap:12px;margin-bottom:28px;">
                    <div style="flex:1;background:rgba(68,138,255,0.08);border:1px solid rgba(68,138,255,0.2);border-radius:16px;padding:14px 10px;text-align:center;">
                        <div style="font-size:22px;font-weight:bold;color:var(--accent-blue);" id="time-remaining">5:00</div>
                        <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;">Call time left today</div>
                    </div>
                    <div style="flex:1;background:rgba(224,64,251,0.08);border:1px solid rgba(224,64,251,0.2);border-radius:16px;padding:14px 10px;text-align:center;">
                        <div style="font-size:22px;font-weight:bold;color:#E040FB;" id="time-reset">--:--</div>
                        <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;">Resets at</div>
                    </div>
                </div>

                <!-- Quota bar -->
                <div style="margin-bottom:28px;text-align:left;">
                    <div style="display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:8px;">
                        <span>Daily call quota</span>
                        <span id="quota-label">300s / 300s used</span>
                    </div>
                    <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;">
                        <div id="quota-bar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--accent-blue),#E040FB);border-radius:6px;transition:width 0.5s ease;"></div>
                    </div>
                </div>

                <!-- Actions -->
                <div style="display:flex;flex-direction:column;gap:12px;">
                    <button class="btn-primary clickable-text" onclick="window.location.href='index.html?screen=voice-screen'"
                        style="background:linear-gradient(135deg,var(--accent-blue),#E040FB);color:white;font-size:15px;">
                        <i class="fas fa-arrow-left" style="margin-right:8px;"></i> Back to App
                    </button>
                    <button id="logout-btn" class="btn-secondary clickable-text" style="font-size:15px;">
                        <i class="fas fa-sign-out-alt" style="margin-right:8px;"></i> Logout
                    </button>
                </div>

                <!-- Legal links -->
<div style="margin-top:28px;display:flex;flex-wrap:wrap;gap:16px;justify-content:center;">
    <a href="legal/privacy.html" style="color:rgba(255,255,255,0.3);font-size:12px;text-decoration:none;">Privacy</a>
    <a href="legal/terms.html" style="color:rgba(255,255,255,0.3);font-size:12px;text-decoration:none;">Terms</a>
    <a href="legal/support.html" style="color:rgba(255,255,255,0.3);font-size:12px;text-decoration:none;">Support</a>
    <a href="legal/report.html" style="color:rgba(255,255,255,0.3);font-size:12px;text-decoration:none;">Report Issue</a>
</div>
            </div>
        </div>
    </section>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDXTMsESWcJCzDMItxzQhVrPfnQXUDs8RY",
            authDomain: "sympy-ai.firebaseapp.com",
            projectId: "sympy-ai",
            storageBucket: "sympy-ai.firebasestorage.app",
            messagingSenderId: "949064788583",
            appId: "1:949064788583:web:9a63685807881b4da4c2c2"
        };
        firebase.initializeApp(firebaseConfig);
        const API_KEY = "Eghosa1998";
        const BASE_URL = "https://web-production-6c359.up.railway.app";

        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('profile-user-name').innerText = user.displayName || "User";
                document.getElementById('profile-user-email').innerText = user.email;
                await loadQuota(user.uid);
                setResetTime();
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadQuota(uid) {
            try {
                const res = await fetch(`${BASE_URL}/call_quota`, {
                    headers: { 'X-API-KEY': API_KEY, 'X-Device-Id': 'user_' + uid }
                });
                if (!res.ok) return;
                const data = await res.json();
                const remaining = data.seconds_remaining ?? 300;
                const limit = data.limit ?? 300;
                const used = limit - remaining;

                // Update display
                const m = String(Math.floor(remaining / 60)).padStart(2, '0');
                const s = String(remaining % 60).padStart(2, '0');
                document.getElementById('time-remaining').innerText = m + ':' + s;
                document.getElementById('quota-label').innerText = used + 's used / ' + limit + 's daily';
                document.getElementById('quota-bar').style.width = Math.min((used / limit) * 100, 100) + '%';

                // Change colour when almost out
                if (remaining <= 60) {
                    document.getElementById('time-remaining').style.color = '#ff4444';
                    document.getElementById('quota-bar').style.background = '#ff4444';
                }
            } catch (e) {
                console.log('Quota fetch failed:', e);
            }
        }

        function setResetTime() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setUTCHours(24, 0, 0, 0);
            const diff = midnight - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            document.getElementById('time-reset').innerText =
                String(h).padStart(2,'0') + 'h ' + String(m).padStart(2,'0') + 'm';
        }

        document.getElementById('logout-btn').onclick = () => {
            firebase.auth().signOut().then(() => {
                window.location.href = 'index.html';
            });
        };
    </script>
</body>
</html>
